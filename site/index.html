<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-render="profile.title">简历</title>
  <script>document.documentElement.classList.add('js')</script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <noscript>
    <div style="padding:16px;background:#fef3c7;color:#92400e;text-align:center;font-size:14px;font-family:sans-serif;">
      您的浏览器未启用 JavaScript，简历内容仍可正常阅读，但缩放和编辑功能不可用。
    </div>
  </noscript>
  <div class="toast-container" id="toastContainer"></div>
  <div class="page-shell">
    <div class="resume-stage">
      <main class="resume-document" id="resumeDocument" data-js-ready="false">
        <div class="resume-source" id="resumeSource">
          <header class="resume-header">
            <div>
              <h1 data-render="profile.name">姓名</h1>
              <span data-render="profile.title">岗位</span>
              <span data-render="profile.experience"></span>
              <span data-render="profile.所在地"></span>
            </div>
            <div class="identity-meta" aria-label="个人信息">
              <span><img src="assets/icons/person.svg" aria-hidden="true" class="icon-svg"><span data-render="profile.gender">男</span> / <span data-render="profile.age">22岁</span></span>
              <button type="button" class="identity-action" data-copy data-render="profile.phone" aria-label="复制手机号">
                <img src="assets/icons/phone.svg" aria-hidden="true" class="icon-svg">
                <span data-render="profile.phone">电话</span>
              </button>
              <button type="button" class="identity-action" data-copy data-render="profile.email" aria-label="复制邮箱">
                <img src="assets/icons/email.svg" aria-hidden="true" class="icon-svg">
                <span data-render="profile.email">邮箱</span>
              </button>
              <a class="identity-action" href data-render="profile.github" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub 主页">
                <img src="assets/icons/github.svg" aria-hidden="true" class="icon-svg">
                <span data-render="profile.github">GitHub</span>
              </a>
            </div>
            <div class="resume-avatar" data-render="profile.avatar" style="--avatar-image: url('');" aria-hidden="true"></div>
            <div class="timeline-strip" data-render="profile.timeline"></div>
          </header>
        </div>

        <div class="resume-pages" id="resumePages" aria-live="polite"></div>
      </main>
    </div>
  </div>

  <aside class="floating-toolbar" aria-label="简历缩放工具">
    <button type="button" class="tool-button" data-action="zoom-in" aria-label="放大简历">+</button>
    <button type="button" class="tool-button" data-action="zoom-out" aria-label="缩小简历">−</button>
    <button type="button" class="tool-button reset-button" data-action="reset" aria-label="重置简历缩放">100%</button>
    <button type="button" class="tool-button edit-button" id="editBtn" data-action="edit" aria-label="编辑简历" title="编辑简历">✎</button>
  </aside>

  <input type="file" id="fileImportInput" accept=".json,.md,application/json" hidden>

  <div class="editor-panel" id="editorPanel" hidden>
    <div class="editor-header">
      <h2>编辑简历</h2>
      <button type="button" class="editor-close" id="closeEditor" aria-label="关闭编辑">×</button>
    </div>
    <div class="editor-content" id="editorContent"></div>
    <div class="editor-footer">
      <div class="dropdown" id="importDropdown">
        <button type="button" class="editor-btn dropdown-toggle" data-dropdown="importDropdown">
          导入 <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" hidden>
          <button type="button" class="dropdown-item" data-action="import-json">导入 JSON</button>
          <button type="button" class="dropdown-item" data-action="import-md">导入 Markdown</button>
        </div>
      </div>
      <div class="dropdown" id="exportDropdown">
        <button type="button" class="editor-btn dropdown-toggle" data-dropdown="exportDropdown">
          导出 <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" hidden>
          <button type="button" class="dropdown-item" data-action="export-json">导出 JSON</button>
          <button type="button" class="dropdown-item" data-action="export-md">导出 Markdown</button>
          <button type="button" class="dropdown-item" data-action="export-pdf-searchable">导出为图片（PDF）</button>
        </div>
      </div>
      <button type="button" class="editor-btn" data-action="reset-data">重置默认</button>
      <button type="button" class="editor-btn" data-action="print">导出 PDF</button>
      <button type="button" class="editor-btn primary" id="saveData">保存</button>
    </div>
  </div>
  <div class="editor-overlay" id="editorOverlay" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/zoom.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/data.js"></script>
  <script src="js/prefs.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
