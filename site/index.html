<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-render="profile.title">简历</title>
  <script>document.documentElement.classList.add('js')</script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <noscript>
    <div style="padding:16px;background:#fef3c7;color:#92400e;text-align:center;font-size:14px;font-family:sans-serif;">
      您的浏览器未启用 JavaScript，简历内容仍可正常阅读，但缩放和编辑功能不可用。
    </div>
  </noscript>
  <div class="toast-container" id="toastContainer"></div>
  <div class="page-shell">
    <div class="resume-stage">
      <main class="resume-document" id="resumeDocument" data-js-ready="false">
        <div class="resume-source" id="resumeSource">
          <header class="resume-header">
            <div>
              <h1 data-render="profile.name">姓名</h1>
              <span data-render="profile.title">岗位</span>
              <span data-render="profile.experience"></span>
              <span data-render="profile.所在地"></span>
            </div>
            <div class="identity-meta" aria-label="个人信息">
              <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-hidden="true" class="icon-svg"><path d="M718.421333 593.664c81.28 31.146667 134.912 88.661333 134.912 175.658667v90.581333c0 43.52-35.285333 78.762667-78.762666 78.762667H249.429333A78.762667 78.762667 0 0 1 170.666667 859.904V769.28c0-87.04 53.632-144.512 134.912-175.658667a37.077333 37.077333 0 0 1 39.850666 8.746667c4.906667 5.034667 9.130667 9.088 12.714667 12.16A235.392 235.392 0 0 0 512 671.488a235.434667 235.434667 0 0 0 157.781333-60.373333c2.56-2.304 5.546667-5.205333 8.96-8.704a36.906667 36.906667 0 0 1 39.68-8.746667zM512 128a196.906667 196.906667 0 0 1 196.906667 196.906667V415.573333a196.906667 196.906667 0 0 1-393.813334 0V324.906667A196.906667 196.906667 0 0 1 512 128z"/></svg><span data-render="profile.gender">男</span> / <span data-render="profile.age">22岁</span></span>
              <button type="button" class="identity-action" data-copy data-render="profile.phone" aria-label="复制手机号">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-hidden="true" class="icon-svg"><path d="M820.409449 797.228346q0 25.19685-10.07874 46.866142t-27.716535 38.299213-41.322835 26.204724-50.897638 9.574803l-357.795276 0q-27.212598 0-50.897638-9.574803t-41.322835-26.204724-27.716535-38.299213-10.07874-46.866142l0-675.275591q0-25.19685 10.07874-47.370079t27.716535-38.80315 41.322835-26.204724 50.897638-9.574803l357.795276 0q27.212598 0 50.897638 9.574803t41.322835 26.204724 27.716535 38.80315 10.07874 47.370079l0 675.275591zM738.771654 170.330709l-455.559055 0 0 577.511811 455.559055 0 0-577.511811zM510.992126 776.062992q-21.165354 0-36.787402 15.11811t-15.622047 37.291339q0 21.165354 15.622047 36.787402t36.787402 15.622047q22.173228 0 37.291339-15.622047t15.11811-36.787402q0-22.173228-15.11811-37.291339t-37.291339-15.11811zM591.622047 84.661417q0-8.062992-5.03937-12.598425t-11.086614-4.535433l-128 0q-5.03937 0-10.582677 4.535433t-5.543307 12.598425 5.03937 12.598425 11.086614 4.535433l128 0q6.047244 0 11.086614-4.535433t5.03937-12.598425z"/></svg>
                <span data-render="profile.phone">电话</span>
              </button>
              <button type="button" class="identity-action" data-copy data-render="profile.email" aria-label="复制邮箱">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" aria-hidden="true" class="icon-svg"><path d="M838.954667 234.666667H170.666667c-3.626667 0-7.168 0.448-10.56 1.322666l323.690666 323.669334a21.333333 21.333333 0 0 0 30.165334 0L838.954667 234.666667z m46.144 14.186666l-260.693334 260.693334 262.933334 262.912c5.44-7.168 8.661333-16.106667 8.661333-25.792V277.333333c0-10.944-4.117333-20.906667-10.88-28.48zM843.861333 789.333333l-249.6-249.621333-50.133333 50.133333a64 64 0 0 1-90.517333 0l-50.112-50.133333L156.373333 786.88c4.48 1.578667 9.28 2.453333 14.314667 2.453333h673.194667zM128.661333 754.218667L373.333333 509.525333 129.578667 265.813333A42.709333 42.709333 0 0 0 128 277.333333v469.333334c0 2.56 0.213333 5.098667 0.661333 7.552zM170.666667 192h682.666666a85.333333 85.333333 0 0 1 85.333334 85.333333v469.333334a85.333333 85.333333 0 0 1-85.333334 85.333333H170.666667a85.333333 85.333333 0 0 1-85.333334-85.333333V277.333333a85.333333 85.333333 0 0 1 85.333334-85.333333z"/></svg>
                <span data-render="profile.email">邮箱</span>
              </button>
              <a class="identity-action" href data-render="profile.github" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub 主页">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" class="icon-svg" fill="currentColor"><path d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943"/></svg>
                <span data-render="profile.github">GitHub</span>
              </a>
            </div>
            <div class="resume-avatar" data-render="profile.avatar" style="--avatar-image: url('');" aria-hidden="true"></div>
            <div class="timeline-strip" data-render="profile.timeline"></div>
          </header>
        </div>

        <div class="resume-pages" id="resumePages" aria-live="polite"></div>
      </main>
    </div>
  </div>

  <aside class="floating-toolbar" aria-label="简历缩放工具">
    <button type="button" class="tool-button" data-action="zoom-in" aria-label="放大简历">+</button>
    <button type="button" class="tool-button" data-action="zoom-out" aria-label="缩小简历">−</button>
    <button type="button" class="tool-button reset-button" data-action="reset" aria-label="重置简历缩放">100%</button>
    <button type="button" class="tool-button edit-button" id="editBtn" data-action="edit" aria-label="编辑简历" title="编辑简历">✎</button>
  </aside>

  <input type="file" id="fileImportInput" accept=".json,.md,application/json" hidden>

  <div class="editor-panel" id="editorPanel" hidden>
    <div class="editor-header">
      <h2>编辑简历</h2>
      <button type="button" class="editor-close" id="closeEditor" aria-label="关闭编辑">×</button>
    </div>
    <div class="editor-content" id="editorContent"></div>
    <div class="editor-footer">
      <div class="dropdown" id="importDropdown">
        <button type="button" class="editor-btn dropdown-toggle" data-dropdown="importDropdown">
          导入 <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" hidden>
          <button type="button" class="dropdown-item" data-action="import-json">导入 JSON</button>
          <button type="button" class="dropdown-item" data-action="import-md">导入 Markdown</button>
        </div>
      </div>
      <div class="dropdown" id="exportDropdown">
        <button type="button" class="editor-btn dropdown-toggle" data-dropdown="exportDropdown">
          导出 <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" hidden>
          <button type="button" class="dropdown-item" data-action="export-json">导出 JSON</button>
          <button type="button" class="dropdown-item" data-action="export-md">导出 Markdown</button>
          <button type="button" class="dropdown-item" data-action="export-pdf-image">导出为图片（PDF）</button>
        </div>
      </div>
      <button type="button" class="editor-btn" data-action="reset-data">重置默认</button>
      <button type="button" class="editor-btn" data-action="print">导出 PDF（浏览器打印）</button>
      <button type="button" class="editor-btn primary" id="saveData">保存</button>
    </div>
  </div>
  <div class="editor-overlay" id="editorOverlay" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/zoom.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/data.js"></script>
  <script src="js/prefs.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
